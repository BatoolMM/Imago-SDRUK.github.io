autoInstallPeers: true
minimumReleaseAge: 1440
blockExoticSubdeps: true
allowBuilds:
  '@sentry/cli': false
  argon2: false
  esbuild: false
  isolated-vm: true
  oracledb: false
  protobufjs: false
  sharp: false
  sqlite3: false
  vue-demi: false
  better-sqlite3: false
  libpq: false
  canvas: false
  pg: false

